# 日本采销管理系统 - 生产环境Docker Compose配置
# 适用于腾讯云2G4核服务器

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: japan-sales-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=japan_purchase_sales
      - DB_SYNCHRONIZE=false
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=3001
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - japan-sales-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web管理后台
  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    container_name: japan-sales-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - japan-sales-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: japan-sales-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
      - "3001:3001"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - web-admin
    networks:
      - japan-sales-network

  # PostgreSQL数据库
  postgres:
    image: postgres:14-alpine
    container_name: japan-sales-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=japan_purchase_sales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - japan-sales-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 内存优化配置
    shm_size: 256mb

# 网络配置
networks:
  japan-sales-network:
    driver: bridge

# 数据卷配置
volumes:
  postgres_data:
    driver: local
