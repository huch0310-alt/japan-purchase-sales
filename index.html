<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="日本采销管理系统">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1E88E5">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日本采销管理系统">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>日本采销管理系统</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #1a1a2e;
    }
    /* Desktop wrapper - centers the phone frame */
    .desktop-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0;
    }
    /* Phone frame */
    .phone-frame {
      width: 414px;
      height: calc(100vh - 40px);
      max-height: 896px;
      background-color: #fff;
      border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
    }
    /* Mobile: full screen, no frame */
    @media (max-width: 480px) {
      .desktop-wrapper {
        padding: 0;
      }
      .phone-frame {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="desktop-wrapper">
    <div class="phone-frame">
      <flutter-app id="main-app"></flutter-app>
    </div>
  </div>
  <script>
    // Configure Flutter with HTML renderer for better size control
    window.flutterConfiguration = {
      renderer: "html"
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Force HTML renderer
    if (window._flutter && window._flutter.loader) {
      window._flutter.loader.load({
        config: { renderer: "html" },
        serviceWorkerSettings: {
          serviceWorkerVersion: "3967129387"
        }
      });
    }
  </script>
</body>
</html>
