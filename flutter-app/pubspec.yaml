name: japan_purchase_sales
description: 日本采销管理系统 - 采购、销售、客户端APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI组件
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  fluttertoast: ^8.2.4
  pull_to_refresh: ^2.0.0

  # 多语言
  intl: ^0.20.2

  # PDF生成
  pdf: ^3.10.8
  printing: ^5.12.0

  # 其他工具
  uuid: ^4.3.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
