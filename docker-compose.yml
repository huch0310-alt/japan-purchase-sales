# 日本采销管理系统 - Docker Compose 生产环境配置
# 使用方式: docker-compose up -d

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: japan-sales-backend
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - DB_DATABASE=japan_purchase_sales
      - DB_SYNCHRONIZE=false
      - JWT_SECRET=jwt-secret-key-change-in-production-use-strong-random-string
      - JWT_EXPIRES_IN=7d
    volumes:
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - japan-sales-network
    restart: unless-stopped

  # Web管理后台
  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    container_name: japan-sales-web
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - japan-sales-network
    restart: unless-stopped

  # PostgreSQL数据库
  postgres:
    image: postgres:14-alpine
    container_name: japan-sales-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=japan_purchase_sales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - japan-sales-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # pgAdmin数据库管理工具 (仅开发环境启用)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: japan-sales-pgadmin
    ports:
      - "127.0.0.1:5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - japan-sales-network
    restart: unless-stopped

# 网络配置
networks:
  japan-sales-network:
    driver: bridge

# 数据卷配置
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
